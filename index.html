    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ExpensasPlus" />
    <link rel="apple-touch-icon" href="/expensas-plus/icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/expensas-plus/icon-167.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/expensas-plus/icon-512.png" />
    <title>ExpensasPlus</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/expensas-plus/assets/index-Sx4fIsrP.js"></script>
    <link rel="stylesheet" crossorigin href="/expensas-plus/assets/index-GujgNmTU.css">
  <link rel="manifest" href="/expensas-plus/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/expensas-plus/registerSW.js"></script></head>
  <body>
    <div id="root"></div>

    <!-- Polyfills para Safari iOS < 15.4
         .at() no existe en Safari 15.3 e inferiores;
         su ausencia provoca un TypeError que deja la pantalla en blanco -->
    <script>
      if (![].at) {
        [Array, String, Int8Array, Uint8Array, Uint8ClampedArray,
         Int16Array, Uint16Array, Int32Array, Uint32Array,
         Float32Array, Float64Array].forEach(function(C) {
          if (C && C.prototype && !C.prototype.at) {
            Object.defineProperty(C.prototype, 'at', {
              value: function(n) {
                n = Math.trunc(n) || 0;
                if (n < 0) n += this.length;
                if (n < 0 || n >= this.length) return undefined;
                return this[n];
              },
              writable: true, configurable: true
            });
          }
        });
      }

      // Muestra errores críticos visibles si React no llega a montar
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.firstChild) {
          root.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">'
            + '<strong>Error al cargar la app</strong><br>'
            + (e.message || 'Error desconocido') + '<br>'
            + '<small>' + (e.filename ? e.filename.split('/').pop() : '') + ':' + (e.lineno || '') + '</small>'
            + '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var root = document.getElementById('root');
        if (root && !root.firstChild) {
          root.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">'
            + '<strong>Error al cargar la app</strong><br>'
            + (e.reason && e.reason.message ? e.reason.message : String(e.reason))
            + '</div>';
        }
      });
    </script>

  </body>
</html>
